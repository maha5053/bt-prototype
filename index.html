<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio — прототип</title>
    <script>
      // Restore SPA deep link after GitHub Pages 404 redirect.
      // If URL is /<repo>/?/<route>, rewrite to /<repo>/<route> for BrowserRouter.
      (function () {
        var l = window.location;
        if (!l.search || l.search.length < 2) return;
        if (l.search[1] !== "/") return;

        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("&");

        var newPath = decoded.slice(1); // remove leading "/"
        l.replace(l.pathname.replace(/\/$/, "") + newPath + l.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
