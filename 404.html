<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio — прототип</title>
    <script>
      // GitHub Pages SPA fallback:
      // Save the originally requested URL, then redirect to /<repo>/ so index.html can load.
      (function () {
        var l = window.location;
        var parts = l.pathname.split("/");
        // Expected: /<repo>/<...>
        var repo = parts.length > 1 ? parts[1] : "";
        var base = repo ? "/" + repo + "/" : "/";
        var url = l.origin + l.pathname + l.search + l.hash;
        localStorage.setItem("spa-redirect", url);
        l.replace(base);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="./">main page</a>...</p>
  </body>
</html>
