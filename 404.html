<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Bio — прототип</title>
  <script>
    // Use hash-based redirect to avoid 404.html re-triggering
    var path = window.location.pathname.replace('/bt-prototype', '');
    // Store the path in hash format so 404.html doesn't re-trigger on redirect
    var hashPath = '#redirect' + path;
    window.location.replace('/bt-prototype/' + hashPath + window.location.search);
  </script>
</head>

<body>
  <p>Redirecting...</p>
</body>

</html>
